name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install python-docx lxml pyinstaller

    - name: Build EXE
      run: |
        pyinstaller --onefile --windowed --name "Word格式检查修复工具" docx_format_checker.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WordFormatChecker-windows
        path: dist/Word格式检查修复工具.exe
